<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>设置 — Purolator Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div class="header-brand">
        <span class="brand-icon">📦</span>
        <span class="brand-name">Batch<strong>Tracker</strong> <span class="brand-suffix">设置</span></span>
      </div>
      <a href="#" id="link-results" class="header-link">查看结果 ↗</a>
    </header>

    <main class="settings-body">

      <!-- ── 物流商凭证配置 (动态生成) ─────────────── -->
      <div id="carrier-sections-container">
        <!-- Rendered dynamically by options.js from CARRIERS registry -->
      </div>

      <!-- ── 查询调度 ──────────────────────────────── -->
      <section class="section">
        <h2 class="section-title">
          <span class="section-icon">⏱</span> 随机查询调度
          <span class="section-note">适用于所有物流商</span>
        </h2>

        <div class="field-group-label">
          查询间隔范围（随机延迟）
          <span class="sub-hint">每次查询后随机等待此范围内的时长，避免被物流商后台限制</span>
        </div>
        <div class="inline-fields">
          <div class="field flex-1">
            <label for="min-delay">最小间隔（秒）</label>
            <input type="number" id="min-delay" min="8" max="600" class="field-input" placeholder="12"/>
          </div>
          <div class="range-sep">—</div>
          <div class="field flex-1">
            <label for="max-delay">最大间隔（秒）</label>
            <input type="number" id="max-delay" min="10" max="3600" class="field-input" placeholder="35"/>
          </div>
        </div>

        <div class="field">
          <label for="total-hours">
            时间窗口（小时）<span class="optional-badge">可选</span>
          </label>
          <div class="field-hint">设置后将在此时间内<strong>自适应</strong>分配查询间隔，0 = 仅使用上方随机范围</div>
          <input type="number" id="total-hours" min="0" max="72" step="0.5" class="field-input" style="max-width:130px" placeholder="0"/>
        </div>

        <div class="field">
          <label for="language">查询语言</label>
          <select id="language" class="field-select">
            <option value="en">English（英文）</option>
            <option value="fr">Français（法文）</option>
          </select>
        </div>

        <div class="preview-box" id="delay-preview">
          <div class="preview-title">📊 当前配置效果预览</div>
          <div class="preview-body" id="preview-content">保存设置后自动更新</div>
        </div>
      </section>

      <!-- ── 重试策略 ──────────────────────────────── -->
      <section class="section">
        <h2 class="section-title">
          <span class="section-icon">🔄</span> 非致命错误重试
        </h2>
        <div class="field-hint-box">
          <strong>⚠️ 致命错误（401 / 403 / 429）</strong>将始终立即停止队列并发出系统通知，与此设置无关。
        </div>
        <div class="inline-fields">
          <div class="field flex-1">
            <label for="max-retries">最大重试次数</label>
            <input type="number" id="max-retries" min="0" max="10" class="field-input" placeholder="2"/>
          </div>
          <div class="field flex-1">
            <label for="retry-delay">重试等待（秒）</label>
            <input type="number" id="retry-delay" min="5" max="300" class="field-input" placeholder="60"/>
          </div>
        </div>
      </section>

    </main>

    <footer class="page-footer">
      <div class="save-status" id="save-status"></div>
      <div class="footer-actions">
        <button class="btn btn-ghost" id="btn-reset-defaults">恢复默认</button>
        <button class="btn btn-primary" id="btn-save">💾 保存所有设置</button>
      </div>
    </footer>

  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
